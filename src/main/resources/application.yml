cohere:
  api-key: ${COHERE_API_KEY}
  embedding-model: ${COHERE_EMBEDDING_MODEL:embed-v4.0}

huggingface:
  api-key: ${HUGGINGFACE_API_KEY}
  model: ${HUGGINGFACE_MODEL:meta-llama/Llama-3.1-8B-Instruct:novita}
  url: ${HUGGINGFACE_URL:https://router.huggingface.co/v1/chat/completions}

app:
  sample-data:
    enabled: ${APP_SAMPLE_DATA_ENABLED:false}
    skip-if-data-exists: ${APP_SAMPLE_DATA_SKIP_IF_EXISTS:true}
    payment-failure-logs: []
    null-pointer-logs: []
    runbook-steps: []
